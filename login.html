<!DOCTYPE html>
<html lang="de">
<head><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>(async function(){const s=window.supabase.createClient("https://izbokhexirglwthffkis.supabase.co","sb_publishable_5ojCJQblvrXTf4lk1rNQ0A_fzmkvz4q");const{data:{session}}=await s.auth.getSession();if(!session){window.location.href="index.html";}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academify — Anmelden</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0e14; --surface: #13141c; --surface2: #1a1b26;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
    --accent: #7c6dfa; --accent2: #a78bfa; --text: #e8e6f0; --muted: #6b6880;
    --success: #4ade80; --coral: #f87171;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,109,250,0.10) 0%, transparent 70%); pointer-events: none;
  }
  .container { width: 100%; max-width: 440px; position: relative; z-index: 1; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; justify-content: center; }
  .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 24px; letter-spacing: -0.3px; }
  .logo-text span { color: var(--accent2); }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 2.5rem; position: relative; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(124,109,250,0.4), transparent); }
  .card-header { margin-bottom: 1.8rem; }
  .card-header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; line-height: 1.2; margin-bottom: 0.5rem; }
  .card-header h1 em { font-style: italic; color: var(--accent2); }
  .card-header p { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.6; }
  .field { margin-bottom: 1.2rem; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,109,250,0.12); }
  .btn-primary {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; color: white; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.01em; margin-bottom: 1rem;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .register-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.5rem; }
  .register-link a { color: var(--accent2); text-decoration: none; }
  .register-link a:hover { text-decoration: underline; }
  .error-msg { font-size: 12px; color: var(--coral); margin-top: 6px; display: none; }
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 20px; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0; transition: all 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer" title="Zur Startseite">
    <div class="logo-mark">🎓</div>
    <div class="logo-text">Acade<span>mify</span></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h1>Willkommen <em>zurück</em></h1>
      <p>Melde dich mit deinem Academify-Konto an.</p>
    </div>

    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="deine@email.de">
      <div class="error-msg" id="err-email">Bitte eine gültige E-Mail eingeben</div>
    </div>

    <div class="field">
      <label>Passwort</label>
      <input type="password" id="pw" placeholder="Passwort">
      <div class="error-msg" id="err-pw">Bitte Passwort eingeben</div>
    </div>

    <div class="error-msg" id="err-login" style="text-align:center;margin-bottom:1rem;font-size:13px">
      ❌ E-Mail oder Passwort falsch. Bitte überprüfe deine Eingaben.
    </div>

    <button class="btn-primary" id="btnLogin" onclick="handleLogin()">Anmelden →</button>

    <div class="register-link">
      Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // MVP Demo-Datenbank (wird später durch echte Datenbank ersetzt)
  const users = [
    { email: 'demo@academify.xyz', pw: 'Demo1234', redirect: 'dashboard.html' },
    { email: 'student@academify.xyz', pw: 'Student1234', redirect: 'dashboard.html' },
    { email: 'admin@academify.xyz', pw: 'Admin1234', redirect: 'admin.html' },
    { email: 'master@academify.xyz', pw: 'Master1234', redirect: 'master.html' }
  ];

  function handleLogin() {
    const email = document.getElementById('email').value.trim().toLowerCase();
    const pw = document.getElementById('pw').value;
    let ok = true;

    document.getElementById('err-email').style.display = email ? 'none' : 'block';
    if (!email) ok = false;

    document.getElementById('err-pw').style.display = pw ? 'none' : 'block';
    if (!pw) ok = false;

    document.getElementById('err-login').style.display = 'none';

    if (!ok) return;

    const btn = document.getElementById('btnLogin');
    btn.textContent = 'Wird überprüft...';
    btn.style.opacity = '0.7';

    setTimeout(() => {
      // Prüfe ob E-Mail + Passwort in der Datenbank existiert
      const user = users.find(u => u.email === email && u.pw === pw);

      if (user) {
        showToast('✓ Erfolgreich angemeldet!');
        setTimeout(() => { window.location.href = user.redirect || 'dashboard.html'; }, 700);
      } else {
        btn.textContent = 'Anmelden →';
        btn.style.opacity = '1';
        document.getElementById('err-login').style.display = 'block';
      }
    }, 800);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
